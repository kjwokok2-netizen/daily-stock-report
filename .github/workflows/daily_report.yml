name: Daily Stock Report Generation

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Run Script
        run: python main.py # 리포트 생성 스크립트 실행
      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3 # 결과를 웹에 게시
